# Workflow customizado de Pages — substitui o workflow padrão que
# tenta buildar com Jekyll em docs/ e falha.
#
# Esse workflow só faz checkout + upload direto dos arquivos da
# raiz do repo, sem Jekyll, sem build. O Pages serve literalmente
# index.html, app.js, etc.
#
# Quando esse arquivo existir, o GitHub Pages usa ele em vez do
# workflow dinâmico interno. (Source no painel continua sendo
# "GitHub Actions", mas o workflow abaixo é o que roda.)

name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Não rodar ao mesmo tempo que outros deploys do Pages
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve o conteúdo da raiz do repo, sem build
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
